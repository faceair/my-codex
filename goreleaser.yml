project_name: my-codex

before:
  hooks:
    - go test ./...

builds:
  - id: my-codex
    main: ./cmd/my-codex
    binary: my-codex
    goos:
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    ldflags:
      - -s -w -X main.version={{ .Version }}

  - id: codex-stop-guard
    main: ./cmd/codex-stop-guard
    binary: codex-stop-guard
    goos:
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64

archives:
  - id: release-bundle
    ids:
      - my-codex
      - codex-stop-guard
    name_template: >-
      {{ .ProjectName }}_{{ .Os }}_{{ .Arch }}
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip

checksum:
  name_template: checksums.txt

release:
  draft: false
